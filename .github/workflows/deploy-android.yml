name: Deploy Android to Google Play (.NET 10)

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  build-and-release:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest # No seu Gitea, isso já aponta para a máquina local

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Removido o "setup-dotnet" e "workload install" pois a máquina local já gerencia isso

      - name: Decode Android Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/app.keystore          

      - name: Build and Publish (Generate AAB)
        run: |
          dotnet publish XpemFinancial/XpemFinancial.csproj -c Release -f net10.0-android \
            /p:ApplicationVersion=${{ github.run_number }} \
            /p:AndroidKeyStore=true \
            /p:AndroidSigningKeyStore=${{ github.workspace }}/app.keystore \
            /p:AndroidSigningKeyAlias=${{ secrets.ANDROID_KEY_ALIAS }} \
            /p:AndroidSigningKeyPass=${{ secrets.ANDROID_KEY_PASSWORD }} \
            /p:AndroidSigningStorePass=${{ secrets.ANDROID_KEY_PASSWORD }}          

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.Xpem.XpemFinancial
          releaseFiles: |
            XpemFinancial/bin/Release/net10.0-android/*-Signed.aab            
          track: internal
          status: completed