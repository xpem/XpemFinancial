name: Deploy Android to Google Play (.NET 10)

on:
  # push:
  #   branches:
  #     - '**'
  pull_request:
    branches:
      - master
    types:
      - closed

jobs:
  build-and-release:
    if: (github.event_name == 'push' || github.event.pull_request.merged == true) && !contains(github.server_url, 'github.com')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Ajustado para v4.0.0 (Garante o uso de Node 20)
      - name: Setup Java (Requisito para o Android SDK)
        uses: actions/setup-java@v4.0.0
        with:
          distribution: 'zulu'
          java-version: '17'

      # Ajustado para v3.0.0 (Garante o uso de Node 20)
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.0.0

      - name: Install MAUI Android Workload
        run: dotnet workload install maui-android

      - name: Run Unit Tests
        run: dotnet test --framework net10.0

      - name: Generate ApiKeys.cs
        run: |
          cat > ApiRepo/ApiKeys.cs << 'EOF'
          namespace ApiRepo
          {
              internal static class ApiKeys
              {
                  public const string ApiAddress = "${{ secrets.API_ADDRESS }}";
                  public const string KEY32 = "${{ secrets.KEY32 }}";
                  public const string IV16 = "${{ secrets.IV16 }}";
              }
          }
          EOF

      - name: Decode Android Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/app.keystore          

      - name: Build and Publish (Generate AAB)
        run: |
          dotnet publish XpemFinancial/XpemFinancial.csproj -c Release -f net10.0-android \
            /p:ApplicationVersion=$(( ${{ github.run_number }} + 18 )) \
            /p:AndroidKeyStore=true \
            /p:AndroidSigningKeyStore=${{ github.workspace }}/app.keystore \
            /p:AndroidSigningKeyAlias=${{ secrets.ANDROID_KEY_ALIAS }} \
            /p:AndroidSigningKeyPass=${{ secrets.ANDROID_KEY_PASSWORD }} \
            /p:AndroidSigningStorePass=${{ secrets.ANDROID_KEY_PASSWORD }}          

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.Xpem.XpemFinancial
          releaseFiles: |
            XpemFinancial/bin/Release/net10.0-android/*-Signed.aab            
          track: internal
          status: completed